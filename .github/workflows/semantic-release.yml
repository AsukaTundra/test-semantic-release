name: semantic-release

on:
  push:
    branches:
      - master
      - release

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Export current git hash
        run: echo "GIT_HASH=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js artifact
        run: npm run build

      - name: Archive build artifact
        run: |
          rm -rf dist
          mkdir -p dist
          ARTIFACT_PATH="dist/next-build-${GIT_HASH}.tar.gz"
          FILES=(.next package.json package-lock.json next.config.ts)

          if [ -d public ]; then
            FILES+=(public)
          fi

          tar -czf "$ARTIFACT_PATH" "${FILES[@]}"

      - name: Install semantic-release (npx)
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/npm \
            @semantic-release/git \
            @semantic-release/github \
            conventional-changelog-conventionalcommits

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run semantic-release
